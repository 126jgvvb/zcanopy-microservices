syntax="proto3";

package auth.v1;

service AuthService {
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc LoginBroker (LoginBrokerRequest) returns (LoginBrokerResponse);
  rpc RefreshToken (RefreshTokenRequest) returns (LoginResponse);
  rpc ValidateToken (ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc IssueCustomerSession (IssueCustomerSessionRequest) returns (IssueCustomerSessionResponse);
  rpc ValidateCustomerSession (ValidateCustomerSessionRequest) returns (ValidateCustomerSessionResponse);
  rpc GetCustomerSession (GetCustomerSessionRequest) returns (GetCustomerSessionResponse);
  rpc UpdateCustomerLocation (UpdateCustomerSessionRequest) returns (UpdateCustomerSessionResponse);
  rpc RevokeCustomerSession (RevokeCustomerSessionRequest) returns (RevokeCustomerSessionResponse);
  rpc IssueBrokerSession (IssueBrokerSessionRequest) returns (IssueBrokerSessionResponse);
  rpc ValidateBrokerSession (ValidateBrokerSessionRequest) returns (ValidateBrokerSessionResponse);
  rpc GetBrokerSession (GetBrokerSessionRequest) returns (GetBrokerSessionResponse);
  rpc RevokeBrokerSession (RevokeBrokerSessionRequest) returns (RevokeBrokerSessionResponse);
}

message LoginRequest {
  string email = 1;
  string password = 2;
  string type = 3;
}

message LoginBrokerRequest {
  string brokerCode = 1;
  string password = 2;
  string deviceId = 3;
  string googleId = 4;
}

message LoginBrokerResponse {
  bool success = 1;
  string message = 2;
  string id = 3;
  string email = 4;
  string username = 5;
  string brokerCode = 6;
  bool isVerified = 7;
}

message LoginResponse {
  string accessToken = 1;
  string refreshToken = 2;
  string id = 3;
  string email = 4;
  string username = 5;
  string role = 6;
  string type = 7;
}

message RefreshTokenRequest {
  string token = 1;
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;
  string userId = 2;
  string email = 3;
  string role = 4;
  string type = 5;
}

message IssueCustomerSessionRequest {
  string deviceId = 1;
  int32 ttlSeconds = 2;
}

message IssueCustomerSessionResponse {
  string sessionToken = 1;
  string sessionId = 2;
  string deviceId = 3;
  int64 expiresAt = 4;
  int32 ttlSeconds = 5;
}

message ValidateCustomerSessionRequest {
  string sessionToken = 1;
}

message ValidateCustomerSessionResponse {
  bool valid = 1;
  string sessionId = 2;
  string deviceId = 3;
}

message GetCustomerSessionRequest {
  string sessionToken = 1;
}

message GetCustomerSessionResponse {
  bool found = 1;
  string sessionId = 2;
  string deviceId = 3;
  int64 createdAt = 4;
  int64 lastActivityAt = 5;
  double locationLat = 6;
  double locationLng = 7;
  int64 locationUpdatedAt = 8;
  int64 ttlSecondsRemaining = 9;
}

message UpdateCustomerLocationRequest {
  string sessionToken = 1;
  double lat = 2;
  double lng = 3;
}

message UpdateCustomerLocationResponse {
  bool success = 1;
}

message RevokeCustomerSessionRequest {
  string sessionToken = 1;
}

message RevokeCustomerSessionResponse {
  bool success = 1;
}

message IssueBrokerSessionRequest {
  string brokerCode = 1;
  string deviceId = 2;
  int32 ttlSeconds = 3;
}

message IssueBrokerSessionResponse {
  string sessionToken = 1;
  string sessionId = 2;
  string deviceId = 3;
  int64 expiresAt = 4;
  int32 ttlSeconds = 5;
}

message ValidateBrokerSessionRequest {
  string sessionToken = 1;
}

message ValidateBrokerSessionResponse {
  bool valid = 1;
  string sessionId = 2;
  string deviceId = 3;
  string brokerCode = 4;
}

message GetBrokerSessionRequest {
  string sessionToken = 1;
}

message GetBrokerSessionResponse {
  bool found = 1;
  string sessionId = 2;
  string deviceId = 3;
  string brokerCode = 4;
  int64 createdAt = 5;
  int64 lastActivityAt = 6;
  int64 ttlSecondsRemaining = 7;
}

message RevokeBrokerSessionRequest {
  string sessionToken = 1;
}

message RevokeBrokerSessionResponse {
  bool success = 1;
}
